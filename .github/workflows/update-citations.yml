name: Update Scholar citations

# Refreshes the Google Scholar citation number in index.html once a week.
on:
  schedule:
    - cron: "0 6 * * 1"        # every Monday, 06:00 UTC
  workflow_dispatch: {}         # + a manual "Run workflow" button in the Actions tab

permissions:
  contents: write               # lets the job commit the updated number back

concurrency:
  group: update-citations
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet scholarly

      - name: Fetch & update citation count
        env:
          # Optional but recommended for reliable weekly updates.
          # Add a free SerpAPI key at Settings -> Secrets -> Actions -> SERPAPI_KEY.
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python scripts/update_citations.py

      - name: Commit if the number changed
        run: |
          if [[ -n "$(git status --porcelain index.html)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "chore: refresh Scholar citation count [skip ci]"
            git push
          else
            echo "Citation count unchanged; nothing to commit."
          fi
